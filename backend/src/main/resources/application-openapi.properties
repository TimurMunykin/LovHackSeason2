# ── Profile: openapi ─────────────────────────────────────────────────────────
# Used exclusively by the generateOpenApiDocs Gradle task.
# Replaces Postgres with an in-memory H2 database so the app can start and
# expose /v3/api-docs without any external services running.

spring.datasource.url=jdbc:h2:mem:openapi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema from JPA entities (no Flyway needed)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Dummy value so the OpenAI client bean initialises without error
# (no actual API calls are made during spec generation)
OPENAI_API_KEY=dummy-openapi-generation
