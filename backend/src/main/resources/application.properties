server.port=${PORT:3001}

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/unicaldb}
spring.datasource.username=${DB_USERNAME:unical}
spring.datasource.password=${DB_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OpenAI
openai.api-key=${OPENAI_API_KEY}
openai.model.navigator=${OPENAI_MODEL_NAVIGATOR:gpt-4o-mini}
openai.model.extractor=${OPENAI_MODEL_EXTRACTOR:gpt-4o-mini}

# CORS
allowed.origin=${ALLOWED_ORIGIN:http://localhost:3000}

# VNC
vnc.url=${VNC_URL:http://localhost:6080/vnc_lite.html?autoconnect=true&resize=scale&reconnect=true&reconnect_delay=1000}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# Allow larger JSON bodies for /extract (large HTML inputs)
server.tomcat.max-http-form-post-size=-1
