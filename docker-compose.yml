services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - VNC_DOMAIN=${VNC_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - browser

  web:
    build: ./web
    depends_on:
      - browser
    environment:
      - BROWSER_API=http://browser:3001

  browser:
    build: ./browser
    shm_size: "2g"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

volumes:
  caddy_data:
  caddy_config:
